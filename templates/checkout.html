<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page-container">
        <div class="top-bar">
            <div>
                <h1>Customer Checkout</h1>
                <p class="muted">Select a book, customer state, and quantity to process a purchase.</p>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('books.home_page') }}">Home</a>
                <a href="/sales">Sales History</a>
                <a href="/logout" class="secondary-link">Logout</a>
            </div>
        </div>

        <div class="form-section">
            <form method="POST">
                <div class="form-group">
                    <label for="book_id">Select Book</label>
                    <select name="book_id" id="book_id" required>
                        <option value="">Select Book</option>
                        {% for book in books %}
                        <option
                            value="{{ book.id }}"
                            data-price="{{ book.price }}"
                        >
                            {{ book.title }} by {{ book.author }} (Stock: {{ book.quantity }}, Price: ${{ "%.2f"|format(book.price) }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="state">Customer State</label>
                    <select name="state" id="state" required>
                        <option value="">Select State</option>
                        {% for state_code, tax_rate in state_tax_rates.items() %}
                        <option value="{{ state_code }}" data-tax-rate="{{ tax_rate }}">
                            {{ state_code }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity_sold">Quantity to Purchase</label>
                    <input type="number" name="quantity_sold" id="quantity_sold" min="1" required>
                </div>

                <div class="form-group">
                    <label for="subtotal_preview">Subtotal</label>
                    <input type="text" id="subtotal_preview" value="$0.00" readonly>
                </div>

                <div class="form-group">
                    <label for="total_preview">Total After Tax</label>
                    <input type="text" id="total_preview" value="$0.00" readonly>
                </div>

                <button type="submit">Complete Purchase</button>
            </form>
        </div>
    </div>

    <script>
        const bookSelect = document.getElementById("book_id");
        const stateSelect = document.getElementById("state");
        const quantityInput = document.getElementById("quantity_sold");
        const subtotalPreview = document.getElementById("subtotal_preview");
        const totalPreview = document.getElementById("total_preview");

        function updateTotals() {
            const selectedBook = bookSelect.options[bookSelect.selectedIndex];
            const selectedState = stateSelect.options[stateSelect.selectedIndex];

            const price = parseFloat(selectedBook?.dataset.price || 0);
            const taxRate = parseFloat(selectedState?.dataset.taxRate || 0);
            const quantity = parseInt(quantityInput.value) || 0;

            if (!selectedBook.value || !selectedState.value || quantity <= 0) {
                subtotalPreview.value = "$0.00";
                totalPreview.value = "$0.00";
                return;
            }

            const subtotal = price * quantity;
            const total = subtotal + (subtotal * taxRate);

            subtotalPreview.value = `$${subtotal.toFixed(2)}`;
            totalPreview.value = `$${total.toFixed(2)}`;
        }

        bookSelect.addEventListener("change", updateTotals);
        stateSelect.addEventListener("change", updateTotals);
        quantityInput.addEventListener("input", updateTotals);
    </script>
</body>
</html>
