<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page-container">
        <div class="top-bar">
            <div>
                <h1>Customer Checkout</h1>
                <p class="muted">Select a book and quantity to process a customer purchase.</p>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('books.home_page') }}">Home</a>
                <a href="/sales">Sales History</a>
                <a href="/logout" class="secondary-link">Logout</a>
            </div>
        </div>

        <div class="form-section">
            <form method="POST">
                <div class="form-group">
                    <label>Select Book</label>
                    <select name="book_id" required>
                        {% for book in books %}
                        <option value="{{ book.id }}">
                            {{ book.title }} by {{ book.author }} (Stock: {{ book.quantity }}, Price: ${{ "%.2f"|format(book.price) }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Quantity to Purchase</label>
                    <input type="number" name="quantity_sold" min="1" required>
                </div>

                <button type="submit">Complete Purchase</button>
            </form>
        </div>
    </div>
</body>
</html>
