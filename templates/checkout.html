<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>
<body>
    <h1>Customer Checkout</h1>

    <form method="POST">
        <label>Select Book:</label><br>
        <select name="book_id" required>
            {% for book in books %}
            <option value="{{ book.id }}">
                {{ book.title }} by {{ book.author }} (Stock: {{ book.quantity }}, Price: ${{ book.price }})
            </option>
            {% endfor %}
        </select>
        <br><br>

        <label>Quantity to Purchase:</label><br>
        <input type="number" name="quantity_sold" min="1" required>
        <br><br>

        <button type="submit">Complete Purchase</button>
    </form>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
