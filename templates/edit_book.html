<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page-container">
        <div class="top-bar">
            <div>
                <h1>Edit Book</h1>
                <p class="muted">Update the book details below and save your changes.</p>
            </div>
            <div class="nav-links">
                <a href="{{ url_for('books.home_page') }}">Home</a>
                <a href="/books">Inventory</a>
                <a href="/logout" class="secondary-link">Logout</a>
            </div>
        </div>

        <div class="form-section">
            <form method="POST">
                <div class="form-group">
                    <label>ISBN</label>
                    <input type="text" name="isbn" value="{{ book.isbn }}" required>
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" value="{{ book.title }}" required>
                </div>

                <div class="form-group">
                    <label>Author</label>
                    <input type="text" name="author" value="{{ book.author }}" required>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" name="price" value="{{ book.price }}" required>
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" value="{{ book.quantity }}" required>
                </div>

                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
