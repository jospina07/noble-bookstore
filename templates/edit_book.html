<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Book</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page-container">
        <div class="top-bar">
            <div>
                <h1>Edit Book</h1>
                <p class="muted">Update the book details below and save your changes.</p>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/books">Inventory</a>
                <a href="/logout" class="secondary-link">Logout</a>
            </div>
        </div>

        <div class="form-section">
            <form method="POST">
                <label>ISBN:</label><br>
                <input type="text" name="isbn" value="{{ book.isbn }}" required>

                <label>Title:</label><br>
                <input type="text" name="title" value="{{ book.title }}" required>

                <label>Author:</label><br>
                <input type="text" name="author" value="{{ book.author }}" required>

                <label>Price:</label><br>
                <input type="number" step="0.01" name="price" value="{{ book.price }}" required>

                <label>Quantity:</label><br>
                <input type="number" name="quantity" value="{{ book.quantity }}" required>

                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>
</body>
</html>
